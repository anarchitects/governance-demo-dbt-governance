name: dbt Governance Demo

on:
  push:
  pull_request:

jobs:
  governance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare dbt profile
        run: cp profiles.yml.example profiles.yml

      - name: Seed data
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
        run: dbt seed

      - name: Parse dbt project
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
        run: dbt parse

      - name: Setup governance runtime
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
        run: dbt-governance setup

      - name: Run governance check
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
        # Exit code 2 from dbt-governance indicates a runtime or contract
        # compatibility diagnostic. The JSON report is still written.
        # This known issue affects @anarchitects/governance-runtime-dbt@0.1.0,
        # which reports its internal version as 0.0.1. The governance analysis
        # runs and produces output. Remove "|| true" once the upstream npm
        # package is updated.
        run: dbt-governance check --report-path target/governance-report.json || true

      - name: Render markdown report
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
        run: dbt-governance report --format markdown --report-path target/governance-report.md || true

      - name: Upload governance reports
        uses: actions/upload-artifact@v4
        with:
          name: governance-reports
          path: |
            target/governance-report.json
            target/governance-report.md
