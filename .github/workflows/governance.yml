name: dbt Governance Demo

on:
  push:
  pull_request:

jobs:
  governance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare dbt profile
        run: cp profiles.yml.example profiles.yml

      - name: Install dbt package dependencies
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
        run: dbt deps

      - name: Seed data
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
        run: dbt seed

      - name: Parse dbt project
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
        run: dbt parse

      - name: Build dbt models
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
        run: dbt run

      - name: Run dbt tests
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
        run: dbt test

      - name: Setup governance runtime
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
        run: dbt-governance setup

      - name: Run governance check
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
        run: dbt-governance check --report-path target/governance-report.json

      - name: Render markdown report
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
        run: dbt-governance report --format markdown --report-path target/governance-report.md

      - name: Upload governance reports
        uses: actions/upload-artifact@v4
        with:
          name: governance-reports
          path: |
            target/governance-report.json
            target/governance-report.md
